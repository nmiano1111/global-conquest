services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: globalconq
      POSTGRES_PASSWORD: globalconq
      POSTGRES_DB: globalconq
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globalconq -d globalconq"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://postgres:5432/globalconq
      -user=globalconq
      -password=globalconq
      -connectRetries=20
      migrate
    volumes:
      - ./migrations:/flyway/sql:ro

  globalconq-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: globalconq
      DB_PASSWORD: globalconq
      DB_NAME: globalconq
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    # optional: restart unless-stopped

volumes:
  pgdata:

