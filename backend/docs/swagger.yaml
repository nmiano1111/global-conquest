basePath: /
definitions:
  httpapi.createUserReq:
    properties:
      password:
        maxLength: 128
        minLength: 8
        type: string
      username:
        maxLength: 24
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  httpapi.loginReq:
    properties:
      password:
        maxLength: 128
        minLength: 8
        type: string
      username:
        maxLength: 24
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  httpapi.loginResp:
    properties:
      expires_at:
        type: string
      token:
        type: string
      user: {}
    type: object
  store.User:
    properties:
      createdAt:
        type: string
      id:
        type: string
      role:
        type: string
      updatedAt:
        type: string
      userName:
        type: string
    type: object
info:
  contact: {}
  description: API for the game backend server
  title: Backend Game API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a new session token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.loginResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/users:
    post:
      consumes:
      - application/json
      description: Creates a new user with a unique username
      parameters:
      - description: Create user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.createUserReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new user
      tags:
      - users
  /api/users/{username}:
    get:
      description: Retrieves a user by their username
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a user by username
      tags:
      - users
schemes:
- http
swagger: "2.0"
