basePath: /
definitions:
  httpapi.createGameReq:
    properties:
      owner_user_id:
        type: string
      player_ids:
        items:
          type: string
        maxItems: 6
        minItems: 3
        type: array
    required:
    - owner_user_id
    - player_ids
    type: object
  httpapi.createUserReq:
    properties:
      password:
        maxLength: 128
        minLength: 8
        type: string
      username:
        maxLength: 24
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  httpapi.loginReq:
    properties:
      password:
        maxLength: 128
        minLength: 8
        type: string
      username:
        maxLength: 24
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  httpapi.loginResp:
    properties:
      expires_at:
        type: string
      token:
        type: string
      user: {}
    type: object
  httpapi.updateGameStateReq:
    properties:
      state:
        type: object
      status:
        type: string
    required:
    - state
    - status
    type: object
  store.Game:
    properties:
      createdAt:
        type: string
      id:
        type: string
      ownerUserID:
        type: string
      state:
        type: object
      status:
        type: string
      updatedAt:
        type: string
    type: object
  store.User:
    properties:
      createdAt:
        type: string
      id:
        type: string
      role:
        type: string
      updatedAt:
        type: string
      userName:
        type: string
    type: object
info:
  contact: {}
  description: API for the game backend server
  title: Backend Game API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a new session token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.loginResp'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/games:
    get:
      description: Lists stored games with optional filters
      parameters:
      - description: Owner user ID
        in: query
        name: owner_user_id
        type: string
      - description: Game status
        in: query
        name: status
        type: string
      - description: Max games returned
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Game'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List games
      tags:
      - games
    post:
      consumes:
      - application/json
      description: Creates a new game with an initial Risk state
      parameters:
      - description: Create game request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.createGameReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Game'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new game
      tags:
      - games
  /api/games/{id}:
    get:
      description: Retrieves stored game state by id
      parameters:
      - description: Game ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Game'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get game state
      tags:
      - games
  /api/games/{id}/state:
    put:
      consumes:
      - application/json
      description: Persists a new serialized game state
      parameters:
      - description: Game ID
        in: path
        name: id
        required: true
        type: string
      - description: Update game state request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.updateGameStateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Game'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update game state
      tags:
      - games
  /api/users:
    post:
      consumes:
      - application/json
      description: Creates a new user with a unique username
      parameters:
      - description: Create user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpapi.createUserReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new user
      tags:
      - users
  /api/users/{username}:
    get:
      description: Retrieves a user by their username
      parameters:
      - description: Username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a user by username
      tags:
      - users
schemes:
- http
swagger: "2.0"
