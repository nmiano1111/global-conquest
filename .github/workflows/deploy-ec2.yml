name: Deploy (EC2)

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/**"
      - "infra-ec2/**"
      - "*.md"
      - "ARCHITECTURE.md"
      - "MISSING_FUNCTIONALITY.md"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     us-east-1
  AWS_ACCOUNT_ID: "294342039804"
  ECR_REPO:       global-conquest-backend
  S3_BUCKET:      global-conquest-frontend-294342039804

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::294342039804:role/global-conquest-github-actions
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPO:latest" \
            ./backend
          docker push "$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPO:latest"

      - name: Deploy to EC2
        env:
          REGISTRY:  ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="$REGISTRY/$ECR_REPO:$IMAGE_TAG"

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem

          # Sync compose config (Caddyfile and compose file) so changes deploy automatically.
          # The .env file is NOT synced — it lives only on the server and holds secrets.
          scp -o StrictHostKeyChecking=no -i /tmp/key.pem \
            deploy/docker-compose.prod.yml \
            deploy/Caddyfile \
            ubuntu@${{ vars.EC2_HOST }}:~/deploy/

          ssh -o StrictHostKeyChecking=no -i /tmp/key.pem ubuntu@${{ vars.EC2_HOST }} "
            cd ~/deploy &&
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY &&
            ECR_IMAGE=$FULL_IMAGE docker compose -f docker-compose.prod.yml pull backend &&
            ECR_IMAGE=$FULL_IMAGE docker compose -f docker-compose.prod.yml up -d
          "

          rm -f /tmp/key.pem

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::294342039804:role/global-conquest-github-actions
          aws-region: us-east-1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: global-conquest/package-lock.json

      - name: Install dependencies
        working-directory: global-conquest
        run: npm ci

      - name: Build frontend
        working-directory: global-conquest
        env:
          VITE_API_BASE_URL: "http://${{ vars.EC2_HOST }}/api"
          VITE_WS_URL:       "ws://${{ vars.EC2_HOST }}/ws"
        run: npm run build

      - name: Sync to S3
        working-directory: global-conquest
        run: |
          aws s3 sync dist/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"
